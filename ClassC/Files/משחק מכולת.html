<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 המכולת של דני</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Fredoka+One&display=swap');

  :root {
    --cream: #FFF8F0;
    --orange: #FF6B35;
    --yellow: #FFD23F;
    --green: #06D6A0;
    --red: #EF233C;
    --purple: #7B2FBE;
    --blue: #3A86FF;
    --dark: #1A1A2E;
    --card-bg: #FFFFFF;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(6,214,160,0.08) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,210,63,0.05) 0%, transparent 70%);
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, var(--orange) 0%, #FF8C42 100%);
    padding: 20px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }
  header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.04) 20px,
      rgba(255,255,255,0.04) 40px
    );
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: white;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    position: relative;
    letter-spacing: 1px;
  }
  header p {
    color: rgba(255,255,255,0.9);
    font-size: 1.1rem;
    margin-top: 6px;
    position: relative;
    font-weight: 700;
  }

  /* ===== SCOREBOARD ===== */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    flex-wrap: wrap;
  }
  .score-pill {
    background: white;
    border-radius: 50px;
    padding: 12px 28px;
    font-weight: 900;
    font-size: 1.1rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    border: 3px solid transparent;
    transition: transform 0.2s;
  }
  .score-pill:hover { transform: translateY(-2px); }
  .score-pill.correct { border-color: var(--green); color: var(--green); }
  .score-pill.wrong { border-color: var(--red); color: var(--red); }
  .score-pill.question { border-color: var(--purple); color: var(--purple); }
  .score-pill .icon { font-size: 1.4rem; }

  /* ===== PROGRESS BAR ===== */
  .progress-container {
    padding: 0 30px 10px;
    max-width: 700px;
    margin: 0 auto;
  }
  .progress-bar {
    background: rgba(0,0,0,0.08);
    border-radius: 50px;
    height: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border-radius: 50px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ===== GAME AREA ===== */
  .game-area {
    max-width: 700px;
    margin: 0 auto;
    padding: 10px 20px 40px;
  }

  /* ===== QUESTION CARD ===== */
  .question-card {
    background: white;
    border-radius: 24px;
    padding: 32px;
    box-shadow: var(--shadow);
    border: 3px solid rgba(0,0,0,0.06);
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 120px; height: 120px;
    border-radius: 0 24px 0 100%;
    opacity: 0.08;
  }
  .question-card.type-price::before { background: var(--orange); }
  .question-card.type-count::before { background: var(--blue); }
  .question-card.type-change::before { background: var(--green); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Store scene */
  .store-scene {
    background: linear-gradient(180deg, #E8F4FD 0%, #D4EDF9 100%);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    text-align: center;
    border: 2px dashed rgba(0,0,0,0.08);
    position: relative;
  }
  .product-display {
    font-size: clamp(3rem, 10vw, 5rem);
    margin-bottom: 8px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .sale-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 0.85rem;
    font-weight: 900;
    padding: 4px 14px;
    border-radius: 50px;
    margin-bottom: 10px;
    letter-spacing: 1px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .question-text {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 700;
    color: var(--dark);
    line-height: 1.6;
    text-align: center;
  }
  .question-text strong {
    color: var(--orange);
    font-size: 1.1em;
  }

  /* ===== ANSWER INPUT ===== */
  .answer-section {
    margin-top: 28px;
  }
  .shekel-input-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .shekel-label {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--purple);
  }
  .answer-input {
    width: 140px;
    height: 64px;
    border: 3px solid rgba(0,0,0,0.12);
    border-radius: 16px;
    font-size: 1.8rem;
    font-weight: 900;
    text-align: center;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: 'Heebo', sans-serif;
    background: #FAFAFA;
  }
  .answer-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
    background: white;
  }
  .unit-label {
    font-size: 1rem;
    font-weight: 700;
    color: rgba(0,0,0,0.4);
  }

  /* ===== BUTTONS ===== */
  .btn-check {
    display: block;
    width: 100%;
    max-width: 280px;
    margin: 20px auto 0;
    padding: 18px;
    background: linear-gradient(135deg, var(--orange) 0%, #FF8C42 100%);
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,53,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Heebo', sans-serif;
    letter-spacing: 0.5px;
  }
  .btn-check:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,107,53,0.45); }
  .btn-check:active { transform: translateY(0); }
  .btn-check:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== FEEDBACK ===== */
  .feedback {
    margin-top: 20px;
    border-radius: 16px;
    padding: 20px 24px;
    text-align: center;
    animation: feedbackPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: none;
  }
  .feedback.show { display: block; }
  @keyframes feedbackPop {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  .feedback.correct-fb {
    background: linear-gradient(135deg, #D4F5E9, #A8EDD2);
    border: 3px solid var(--green);
  }
  .feedback.wrong-fb {
    background: linear-gradient(135deg, #FFE8EC, #FFCFD5);
    border: 3px solid var(--red);
  }
  .feedback-icon { font-size: 3rem; margin-bottom: 8px; }
  .feedback-msg { font-size: 1.2rem; font-weight: 700; color: var(--dark); }
  .feedback-explain { font-size: 1rem; margin-top: 8px; color: rgba(0,0,0,0.6); font-weight: 600; }

  .btn-next {
    margin-top: 16px;
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--purple), #9B4DCA);
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(123,47,190,0.35);
    transition: transform 0.15s;
    font-family: 'Heebo', sans-serif;
  }
  .btn-next:hover { transform: translateY(-2px); }

  /* ===== RESULTS SCREEN ===== */
  .results-screen {
    display: none;
    text-align: center;
    animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .results-screen.show { display: block; }
  .trophy-area {
    font-size: 5rem;
    margin: 20px 0;
    animation: spin 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes spin {
    from { transform: rotateY(90deg) scale(0.5); opacity: 0; }
    to { transform: rotateY(0) scale(1); opacity: 1; }
  }
  .results-card {
    background: white;
    border-radius: 24px;
    padding: 40px 30px;
    box-shadow: var(--shadow);
    border: 3px solid var(--yellow);
  }
  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .results-score {
    font-size: 4rem;
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
  }
  .results-score span { color: var(--green); }
  .results-subtitle { font-size: 1.2rem; color: rgba(0,0,0,0.5); margin: 8px 0 24px; font-weight: 600; }
  .stars { font-size: 2rem; letter-spacing: 4px; margin-bottom: 20px; }

  .btn-restart {
    padding: 18px 50px;
    background: linear-gradient(135deg, var(--orange), #FF8C42);
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,53,0.35);
    transition: transform 0.15s;
    font-family: 'Heebo', sans-serif;
  }
  .btn-restart:hover { transform: translateY(-3px); }

  .summary-list {
    margin: 20px 0;
    text-align: right;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid rgba(0,0,0,0.06);
  }
  .summary-item {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    font-size: 0.95rem;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item.correct-item { background: rgba(6,214,160,0.08); }
  .summary-item.wrong-item { background: rgba(239,35,60,0.06); }
  .summary-icon { font-size: 1.2rem; }

  /* Floating decorations */
  .floating-decor {
    position: fixed;
    pointer-events: none;
    z-index: -1;
    font-size: 2rem;
    opacity: 0.06;
  }
  .fd1 { top: 10%; left: 5%; animation: float1 7s infinite; }
  .fd2 { top: 30%; right: 8%; animation: float2 9s infinite; }
  .fd3 { bottom: 20%; left: 10%; animation: float1 8s infinite 2s; }
  .fd4 { bottom: 10%; right: 5%; animation: float2 6s infinite 1s; }
  @keyframes float1 {
    0%,100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }
  @keyframes float2 {
    0%,100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(15px) rotate(-8deg); }
  }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Type tag */
  .type-tag {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 900;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }
  .type-tag.price { background: rgba(255,107,53,0.12); color: var(--orange); }
  .type-tag.count { background: rgba(58,134,255,0.12); color: var(--blue); }
  .type-tag.change { background: rgba(6,214,160,0.12); color: #059669; }
  .type-tag.division { background: rgba(123,47,190,0.12); color: var(--purple); }


</style>
</head>
<body>

<!-- Floating decorations -->
<div class="floating-decor fd1">🛒</div>
<div class="floating-decor fd2">🍎</div>
<div class="floating-decor fd3">💰</div>
<div class="floating-decor fd4">🥛</div>

<header>
  <h1>🛒 המכולת של דני</h1>
  <p>בואו נתרגל חשבון בחנות!</p>
</header>

<div class="scoreboard">
  <div class="score-pill question">
    <span class="icon">📋</span>
    <span>שאלה <span id="q-num">1</span> מתוך 10</span>
  </div>
  <div class="score-pill correct">
    <span class="icon">✅</span>
    <span id="correct-count">0</span> נכון
  </div>
  <div class="score-pill wrong">
    <span class="icon">❌</span>
    <span id="wrong-count">0</span> טעות
  </div>
</div>

<div class="progress-container">
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="game-area">

  <!-- Question card -->
  <div class="question-card" id="question-card">
    <div id="type-tag" class="type-tag"></div>
    <div class="store-scene">
      <div class="product-display" id="product-emoji">🍌</div>
      <div class="sale-badge" id="sale-badge">מבצע!</div>
      <div id="store-text" class="question-text"></div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="answer-section">
      <div class="shekel-input-wrap">
        <span class="shekel-label">₪</span>
        <input type="number" class="answer-input" id="answer-input" placeholder="?" min="0" max="9999" />
        <span class="unit-label" id="unit-label">שקל</span>
      </div>

      <button class="btn-check" id="check-btn" onclick="checkAnswer()">בדוק את התשובה ✓</button>
    </div>
    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="feedback-icon"></div>
      <div class="feedback-msg" id="feedback-msg"></div>
      <div class="feedback-explain" id="feedback-explain"></div>
      <button class="btn-next" onclick="nextQuestion()">השאלה הבאה ←</button>
    </div>
  </div>

  <!-- Results screen -->
  <div class="results-screen" id="results-screen">
    <div class="results-card">
      <div class="trophy-area" id="trophy-emoji">🏆</div>
      <div class="results-title">כל הכבוד!</div>
      <div class="results-score"><span id="final-score">0</span> / 10</div>
      <div class="results-subtitle">שאלות נכונות</div>
      <div class="stars" id="stars-display"></div>
      <div class="summary-list" id="summary-list"></div>
      <button class="btn-restart" onclick="restartGame()">🔄 שחקו שוב!</button>
    </div>
  </div>

</div>

<script>
// ==============================
// QUESTION BANK (100+ questions)
// ==============================
const PRODUCTS = [
  { name: 'בננה', emoji: '🍌', plural: 'בננות' },
  { name: 'תפוח', emoji: '🍎', plural: 'תפוחים' },
  { name: 'לחם', emoji: '🍞', plural: 'כיכרות לחם' },
  { name: 'חלב', emoji: '🥛', plural: 'שקיות חלב' },
  { name: 'קוטג', emoji: '🧀', plural: 'קוטג\'', unitSingular: 'קוטג\'' },
  { name: 'ביצה', emoji: '🥚', plural: 'ביצים' },
  { name: 'שוקולד', emoji: '🍫', plural: 'שוקולדים' },
  { name: 'עגבנייה', emoji: '🍅', plural: 'עגבניות' },
  { name: 'מלפפון', emoji: '🥒', plural: 'מלפפונים' },
  { name: 'יוגורט', emoji: '🥣', plural: 'יוגורטים' },
  { name: 'מיץ', emoji: '🧃', plural: 'מיצים' },
  { name: 'גבינה', emoji: '🧀', plural: 'גבינות' },
  { name: 'חמאה', emoji: '🧈', plural: 'חמאות' },
  { name: 'תות', emoji: '🍓', plural: 'תותים' },
  { name: 'ענב', emoji: '🍇', plural: 'ענבים' },
  { name: 'לימון', emoji: '🍋', plural: 'לימונים' },
  { name: 'פלפל', emoji: '🫑', plural: 'פלפלים' },
  { name: 'גזר', emoji: '🥕', plural: 'גזרים' },
  { name: 'בצל', emoji: '🧅', plural: 'בצלים' },
  { name: 'תירס', emoji: '🌽', plural: 'תירסים' },
];

const BILLS = [10, 20, 50, 100, 200];

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Generate question types
function genPricePerUnit() {
  const prod = pick(PRODUCTS);
  const qty = rnd(2, 5);
  const pricePerUnit = rnd(2, 15);
  const total = qty * pricePerUnit;
  return {
    type: 'division',
    emoji: prod.emoji,
    badge: 'מבצע!',
    storeText: `${qty} ${prod.plural} עולות ${total} ש"ח`,
    question: `כמה עולה ${prod.name} אחד/ת?`,
    answer: pricePerUnit,
    hint: `חלקו ${total} ב-${qty}`,
    explain: `${total} ÷ ${qty} = ${pricePerUnit} ש"ח לכל ${prod.name}`,
    unit: 'שקל'
  };
}

function genTotalCost() {
  const prod = pick(PRODUCTS);
  const pricePerUnit = rnd(2, 20);
  const qty = rnd(2, 8);
  const total = qty * pricePerUnit;
  return {
    type: 'count',
    emoji: prod.emoji,
    badge: 'מה המחיר?',
    storeText: `${prod.name} אחד/ת עולה ${pricePerUnit} ש"ח`,
    question: `כמה צריך לשלם על ${qty} ${prod.plural}?`,
    answer: total,
    hint: `כפלו ${pricePerUnit} × ${qty}`,
    explain: `${pricePerUnit} × ${qty} = ${total} ש"ח`,
    unit: 'שקל'
  };
}

function genChange() {
  const prod = pick(PRODUCTS);
  const pricePerUnit = rnd(3, 25);
  // Pick a bill that is strictly bigger than the item price
  const validBills = BILLS.filter(b => b > pricePerUnit);
  if (validBills.length === 0) return genChange(); // retry
  const bill = pick(validBills);
  const change = bill - pricePerUnit;
  return {
    type: 'change',
    emoji: prod.emoji,
    badge: 'עודף?',
    storeText: `${prod.name} אחד/ת עולה ${pricePerUnit} ש"ח`,
    question: `שילמת עם שטר של ${bill} ש"ח. כמה עודף תקבל?`,
    answer: change,
    hint: `חסרו ${bill} - ${pricePerUnit}`,
    explain: `${bill} - ${pricePerUnit} = ${change} ש"ח עודף`,
    unit: 'שקל'
  };
}

function genChangeMultiple() {
  const prod = pick(PRODUCTS);
  const pricePerUnit = rnd(2, 15);
  const qty = rnd(2, 4);
  const total = pricePerUnit * qty;
  const validBills = BILLS.filter(b => b > total);
  if (validBills.length === 0) return genChangeMultiple();
  const bill = pick(validBills);
  const change = bill - total;
  return {
    type: 'change',
    emoji: prod.emoji,
    badge: 'עודף?',
    storeText: `${prod.name} אחד/ת עולה ${pricePerUnit} ש"ח`,
    question: `קנית ${qty} ${prod.plural} ושילמת עם שטר של ${bill} ש"ח. כמה עודף תקבל?`,
    answer: change,
    hint: `קודם חשבו: ${qty} × ${pricePerUnit} = ${total}. אז עודף: ${bill} - ${total}`,
    explain: `${qty} × ${pricePerUnit} = ${total} ש"ח. עודף: ${bill} - ${total} = ${change} ש"ח`,
    unit: 'שקל'
  };
}

function genBundleDeal() {
  const prod = pick(PRODUCTS);
  const bundleQty = pick([2, 3, 4, 5]);
  const bundlePrice = rnd(bundleQty * 2, bundleQty * 8);
  // Ensure price per unit is whole number
  const pricePerUnit = Math.floor(bundlePrice / bundleQty);
  const adjustedTotal = pricePerUnit * bundleQty;
  const wantQty = rnd(1, bundleQty - 1);
  const cost = wantQty * pricePerUnit;
  return {
    type: 'division',
    emoji: prod.emoji,
    badge: 'מבצע מיוחד!',
    storeText: `${bundleQty} ${prod.plural} ב-${adjustedTotal} ש"ח`,
    question: `כמה עולים ${wantQty} ${prod.plural}?`,
    answer: cost,
    hint: `קודם מצאו: ${adjustedTotal} ÷ ${bundleQty} = מחיר ל${prod.name} אחד/ת`,
    explain: `${adjustedTotal} ÷ ${bundleQty} = ${pricePerUnit} ש"ח ל${prod.name}. אז ${wantQty} × ${pricePerUnit} = ${cost} ש"ח`,
    unit: 'שקל'
  };
}

function genHowManyCanBuy() {
  const prod = pick(PRODUCTS);
  const pricePerUnit = rnd(3, 20);
  const budget = pick([10, 15, 20, 25, 30, 40, 50, 60, 100]);
  // Make sure answer > 0 and budget > price
  if (budget <= pricePerUnit) return genHowManyCanBuy();
  const canBuy = Math.floor(budget / pricePerUnit);
  if (canBuy === 0) return genHowManyCanBuy();
  return {
    type: 'count',
    emoji: prod.emoji,
    badge: 'כמה אפשר לקנות?',
    storeText: `${prod.name} אחד/ת עולה ${pricePerUnit} ש"ח`,
    question: `יש לי ${budget} ש"ח. כמה ${prod.plural} אני יכול לקנות?`,
    answer: canBuy,
    hint: `חלקו ${budget} ב-${pricePerUnit}`,
    explain: `${budget} ÷ ${pricePerUnit} = ${canBuy} (שלמים)`,
    unit: prod.plural
  };
}

function genSaleVsNormal() {
  const prod = pick(PRODUCTS);
  const normalPrice = rnd(6, 30);
  const discount = rnd(1, Math.floor(normalPrice / 2));
  const salePrice = normalPrice - discount;
  return {
    type: 'price',
    emoji: prod.emoji,
    badge: 'הנחה!',
    storeText: `${prod.name} עלה ${normalPrice} ש"ח, ועכשיו יש הנחה של ${discount} ש"ח`,
    question: `כמה עולה ${prod.name} במחיר המבצע?`,
    answer: salePrice,
    hint: `חסרו ${normalPrice} - ${discount}`,
    explain: `${normalPrice} - ${discount} = ${salePrice} ש"ח`,
    unit: 'שקל'
  };
}

function genTotalMultiProduct() {
  const prod1 = pick(PRODUCTS);
  let prod2 = pick(PRODUCTS);
  while (prod2.name === prod1.name) prod2 = pick(PRODUCTS);
  const price1 = rnd(3, 20);
  const price2 = rnd(3, 20);
  const qty1 = rnd(1, 4);
  const qty2 = rnd(1, 4);
  const total = price1 * qty1 + price2 * qty2;
  return {
    type: 'count',
    emoji: prod1.emoji,
    badge: 'קנייה כפולה!',
    storeText: `${prod1.name} – ${price1} ש"ח ${prod1.name === prod1.name ? '' : ''}\n${prod2.emoji} ${prod2.name} – ${price2} ש"ח`,
    question: `קניתי ${qty1} ${prod1.plural} ו-${qty2} ${prod2.plural}. כמה לשלם בסך הכל?`,
    answer: total,
    hint: `${qty1} × ${price1} = ${qty1 * price1}. ועוד ${qty2} × ${price2} = ${qty2 * price2}`,
    explain: `(${qty1} × ${price1}) + (${qty2} × ${price2}) = ${qty1 * price1} + ${qty2 * price2} = ${total} ש"ח`,
    unit: 'שקל'
  };
}

// Generator pool
const GENERATORS = [
  genPricePerUnit,
  genTotalCost,
  genChange,
  genChangeMultiple,
  genBundleDeal,
  genHowManyCanBuy,
  genSaleVsNormal,
  genTotalMultiProduct,
];

function generateQuestion() {
  const gen = pick(GENERATORS);
  const q = gen();
  // Validate: answer must be > 0
  if (!q || q.answer <= 0 || isNaN(q.answer)) return generateQuestion();
  return q;
}

// ==============================
// GAME STATE
// ==============================
let questions = [];
let currentQ = 0;
let correctCount = 0;
let wrongCount = 0;
let summaryData = [];
let hintUsed = false;

function generateGameQuestions() {
  questions = [];
  for (let i = 0; i < 10; i++) {
    questions.push(generateQuestion());
  }
}

function startGame() {
  generateGameQuestions();
  currentQ = 0;
  correctCount = 0;
  wrongCount = 0;
  summaryData = [];
  updateScore();
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  hintUsed = false;

  // Update progress
  document.getElementById('q-num').textContent = currentQ + 1;
  const pct = (currentQ / 10) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Type tag
  const tagEl = document.getElementById('type-tag');
  const tagMap = {
    division: { label: '➗ חלוקה', cls: 'division' },
    count: { label: '✖️ כפל', cls: 'count' },
    change: { label: '💵 עודף', cls: 'change' },
    price: { label: '🏷️ מחיר', cls: 'price' },
  };
  const tag = tagMap[q.type] || tagMap.price;
  tagEl.textContent = tag.label;
  tagEl.className = 'type-tag ' + tag.cls;

  // Card type
  const card = document.getElementById('question-card');
  card.className = 'question-card type-' + q.type;

  // Emoji & badge
  document.getElementById('product-emoji').textContent = q.emoji;
  document.getElementById('sale-badge').textContent = q.badge || 'מבצע!';

  // Store text
  document.getElementById('store-text').innerHTML = q.storeText.replace(/\n/g, '<br>');

  // Question
  document.getElementById('question-text').innerHTML = q.question;

  // Unit
  document.getElementById('unit-label').textContent = q.unit || 'שקל';

  // Hint
  document.getElementById('hint-box').textContent = '💡 ' + q.hint;
  document.getElementById('hint-box').classList.remove('show');

  // Clear input
  const input = document.getElementById('answer-input');
  input.value = '';
  input.disabled = false;

  // Hide feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';

  // Enable check button
  document.getElementById('check-btn').disabled = false;

  // Animate card
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';

  // Focus input
  setTimeout(() => input.focus(), 100);
}

function checkAnswer() {
  const input = document.getElementById('answer-input');
  const val = parseFloat(input.value);
  if (input.value === '' || isNaN(val)) {
    input.style.borderColor = 'var(--red)';
    setTimeout(() => input.style.borderColor = '', 500);
    return;
  }

  const q = questions[currentQ];
  const correct = Math.abs(val - q.answer) < 0.01;

  input.disabled = true;
  document.getElementById('check-btn').disabled = true;

  const fb = document.getElementById('feedback');
  const icon = document.getElementById('feedback-icon');
  const msg = document.getElementById('feedback-msg');
  const explain = document.getElementById('feedback-explain');

  if (correct) {
    correctCount++;
    fb.className = 'feedback correct-fb show';
    icon.textContent = pick(['🎉', '⭐', '🌟', '👏', '🥳', '💪']);
    msg.textContent = pick(['כל הכבוד!', 'מעולה!', 'נכון מאוד!', 'חכם/ה!', 'פנטסטי!', 'אלוף/ה!']);
    explain.textContent = q.explain;
    summaryData.push({ text: q.question, correct: true });
    if (!hintUsed) launchConfetti();
  } else {
    wrongCount++;
    fb.className = 'feedback wrong-fb show';
    icon.textContent = pick(['😅', '🤔', '💭', '✏️']);
    msg.textContent = pick(['כמעט!', 'לא הפעם...', 'נסו שוב בפעם הבאה!', 'זה לא קל!']);
    explain.textContent = `התשובה הנכונה: ${q.answer} ${q.unit || 'ש"ח'}. ${q.explain}`;
    summaryData.push({ text: q.question, correct: false });
  }

  updateScore();
}

function updateScore() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 10) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('question-card').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.className = 'results-screen show';

  document.getElementById('final-score').textContent = correctCount;

  // Trophy and stars
  let stars = '';
  let trophy = '🏆';
  if (correctCount === 10) { stars = '⭐⭐⭐⭐⭐'; trophy = '🥇'; }
  else if (correctCount >= 8) { stars = '⭐⭐⭐⭐'; trophy = '🏆'; }
  else if (correctCount >= 6) { stars = '⭐⭐⭐'; trophy = '🎖️'; }
  else if (correctCount >= 4) { stars = '⭐⭐'; trophy = '👍'; }
  else { stars = '⭐'; trophy = '💪'; }

  document.getElementById('trophy-emoji').textContent = trophy;
  document.getElementById('stars-display').textContent = stars;

  // Summary
  const list = document.getElementById('summary-list');
  list.innerHTML = summaryData.map((item, i) =>
    `<div class="summary-item ${item.correct ? 'correct-item' : 'wrong-item'}">
      <span>${i + 1}. ${item.text.substring(0, 50)}${item.text.length > 50 ? '...' : ''}</span>
      <span class="summary-icon">${item.correct ? '✅' : '❌'}</span>
    </div>`
  ).join('');

  if (correctCount === 10) launchConfetti(100);
  else if (correctCount >= 7) launchConfetti(40);
}

function restartGame() {
  document.getElementById('question-card').style.display = 'block';
  document.getElementById('results-screen').className = 'results-screen';
  startGame();
}

// ==============================
// CONFETTI
// ==============================
function launchConfetti(count = 30) {
  const colors = ['#FF6B35', '#FFD23F', '#06D6A0', '#3A86FF', '#7B2FBE', '#EF233C'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${rnd(10, 90)}vw;
        top: -20px;
        background: ${pick(colors)};
        animation-duration: ${rnd(15, 35) / 10}s;
        animation-delay: ${rnd(0, 10) / 10}s;
        transform: rotate(${rnd(0, 360)}deg);
        width: ${rnd(8, 16)}px;
        height: ${rnd(8, 16)}px;
        border-radius: ${rnd(0, 8)}px;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// ==============================
// KEYBOARD SUPPORT
// ==============================
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const fb = document.getElementById('feedback');
    if (fb.classList.contains('show')) {
      nextQuestion();
    } else {
      checkAnswer();
    }
  }
});

// ==============================
// INIT
// ==============================
startGame();
</script>
</body>
</html>
