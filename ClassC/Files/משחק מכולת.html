<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 המכולת של דני</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Fredoka+One&display=swap');

  :root {
    --cream: #FFF8F0;
    --orange: #FF6B35;
    --yellow: #FFD23F;
    --green: #06D6A0;
    --red: #EF233C;
    --purple: #7B2FBE;
    --blue: #3A86FF;
    --dark: #1A1A2E;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(6,214,160,0.08) 0%, transparent 50%);
  }

  header {
    background: linear-gradient(135deg, var(--orange) 0%, #FF8C42 100%);
    padding: 18px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }
  header::before {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px,
      rgba(255,255,255,0.04) 20px, rgba(255,255,255,0.04) 40px);
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: white;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    position: relative;
  }
  header p {
    color: rgba(255,255,255,0.9);
    font-size: 1rem;
    margin-top: 4px;
    position: relative;
    font-weight: 700;
  }

  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 14px 16px 6px;
    flex-wrap: wrap;
  }
  .score-pill {
    background: white;
    border-radius: 50px;
    padding: 9px 18px;
    font-weight: 900;
    font-size: 0.95rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 7px;
    border: 3px solid transparent;
  }
  .score-pill.correct  { border-color: var(--green);  color: var(--green); }
  .score-pill.wrong    { border-color: var(--red);    color: var(--red); }
  .score-pill.question { border-color: var(--purple); color: var(--purple); }
  .score-pill.lives    { border-color: var(--orange); color: var(--orange); }

  .progress-container {
    padding: 0 22px 8px;
    max-width: 700px;
    margin: 0 auto;
  }
  .progress-bar { background: rgba(0,0,0,0.08); border-radius: 50px; height: 12px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border-radius: 50px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .game-area { max-width: 700px; margin: 0 auto; padding: 6px 18px 40px; }

  .screen { display: none; }
  .screen.active { display: block; }

  .question-card {
    background: white;
    border-radius: 24px;
    padding: 26px;
    box-shadow: var(--shadow);
    border: 3px solid rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }
  .question-card.anim { animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(28px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .question-card::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 100px; height: 100px;
    border-radius: 0 24px 0 100%;
    opacity: 0.08;
  }
  .question-card.type-division::before { background: var(--purple); }
  .question-card.type-count::before    { background: var(--blue); }
  .question-card.type-change::before   { background: var(--green); }
  .question-card.type-price::before    { background: var(--orange); }

  .type-tag {
    display: inline-block;
    padding: 3px 13px;
    border-radius: 50px;
    font-size: 0.78rem;
    font-weight: 900;
    margin-bottom: 12px;
  }
  .type-tag.division { background: rgba(123,47,190,0.12); color: var(--purple); }
  .type-tag.count    { background: rgba(58,134,255,0.12);  color: var(--blue); }
  .type-tag.change   { background: rgba(6,214,160,0.12);   color: #059669; }
  .type-tag.price    { background: rgba(255,107,53,0.12);  color: var(--orange); }

  .store-scene {
    background: linear-gradient(180deg, #E8F4FD 0%, #D4EDF9 100%);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 18px;
    text-align: center;
    border: 2px dashed rgba(0,0,0,0.08);
  }
  .product-display {
    font-size: clamp(2.6rem, 9vw, 4.2rem);
    margin-bottom: 6px;
    animation: bounce 2.2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  .sale-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 0.8rem;
    font-weight: 900;
    padding: 3px 12px;
    border-radius: 50px;
    margin-bottom: 8px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.07); }
  }
  .store-text {
    font-size: clamp(1rem, 2.7vw, 1.2rem);
    font-weight: 700;
    color: var(--dark);
    line-height: 1.6;
  }
  .question-text {
    font-size: clamp(1rem, 2.7vw, 1.25rem);
    font-weight: 700;
    color: var(--dark);
    line-height: 1.6;
    text-align: center;
  }

  .answer-section { margin-top: 20px; }
  .shekel-input-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .shekel-label { font-size: 1.6rem; font-weight: 900; color: var(--purple); }
  .answer-input {
    width: 128px;
    height: 58px;
    border: 3px solid rgba(0,0,0,0.15);
    border-radius: 14px;
    font-size: 1.65rem;
    font-weight: 900;
    text-align: center;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: 'Heebo', sans-serif;
    background: #FAFAFA;
  }
  .answer-input:not(:disabled):focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
    background: white;
  }
  .answer-input:disabled { background: #f0f0f0; color: #999; cursor: not-allowed; }
  .answer-input.shake { animation: shake 0.42s both; border-color: var(--red) !important; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .unit-label { font-size: 0.9rem; font-weight: 700; color: rgba(0,0,0,0.38); }

  .btn-check {
    display: block;
    width: 100%;
    max-width: 240px;
    margin: 16px auto 0;
    padding: 15px;
    background: linear-gradient(135deg, var(--orange) 0%, #FF8C42 100%);
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 1.15rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(255,107,53,0.35);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    font-family: 'Heebo', sans-serif;
  }
  .btn-check:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(255,107,53,0.45); }
  .btn-check:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .feedback {
    margin-top: 16px;
    border-radius: 14px;
    padding: 16px 20px;
    text-align: center;
    display: none;
  }
  .feedback.show {
    display: block;
    animation: feedbackPop 0.32s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes feedbackPop {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .feedback.correct-fb { background: linear-gradient(135deg, #D4F5E9, #A8EDD2); border: 3px solid var(--green); }
  .feedback.wrong-fb   { background: linear-gradient(135deg, #FFE8EC, #FFCFD5); border: 3px solid var(--red); }
  .feedback-icon { font-size: 2.4rem; margin-bottom: 5px; }
  .feedback-msg  { font-size: 1.1rem; font-weight: 900; color: var(--dark); }
  .feedback-sub  { font-size: 0.9rem; margin-top: 5px; color: rgba(0,0,0,0.55); font-weight: 600; }
  .feedback-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }

  .btn-next {
    padding: 11px 28px;
    background: linear-gradient(135deg, var(--purple), #9B4DCA);
    color: white; border: none; border-radius: 50px;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 5px 14px rgba(123,47,190,0.35);
    transition: transform 0.15s;
    font-family: 'Heebo', sans-serif;
  }
  .btn-next:hover { transform: translateY(-2px); }

  .btn-retry {
    padding: 11px 28px;
    background: linear-gradient(135deg, #FF8C42, var(--orange));
    color: white; border: none; border-radius: 50px;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 5px 14px rgba(255,107,53,0.35);
    transition: transform 0.15s;
    font-family: 'Heebo', sans-serif;
  }
  .btn-retry:hover { transform: translateY(-2px); }

  /* GAME OVER */
  .gameover-card {
    background: white; border-radius: 24px; padding: 40px 26px;
    box-shadow: var(--shadow); border: 3px solid var(--red);
    text-align: center;
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .gameover-icon  { font-size: 5rem; margin-bottom: 12px; }
  .gameover-title { font-family: 'Fredoka One', cursive; font-size: 2.2rem; color: var(--red); margin-bottom: 8px; }
  .gameover-sub   { font-size: 1.05rem; font-weight: 700; color: rgba(0,0,0,0.5); margin-bottom: 24px; }

  /* RESULTS */
  .results-card {
    background: white; border-radius: 24px; padding: 34px 26px;
    box-shadow: var(--shadow); border: 3px solid var(--yellow);
    text-align: center;
    animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .trophy-area {
    font-size: 5rem; margin: 10px 0;
    animation: trophySpin 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes trophySpin {
    from { transform: rotateY(90deg) scale(0.5); opacity: 0; }
    to   { transform: rotateY(0) scale(1); opacity: 1; }
  }
  .results-title { font-family: 'Fredoka One', cursive; font-size: 2.1rem; color: var(--orange); margin-bottom: 6px; }
  .results-score { font-size: 3.8rem; font-weight: 900; color: var(--dark); line-height: 1; }
  .results-score span { color: var(--green); }
  .results-sub { font-size: 1rem; color: rgba(0,0,0,0.45); margin: 6px 0 18px; font-weight: 600; }
  .stars { font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 16px; }

  .summary-list {
    margin: 14px 0 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid rgba(0,0,0,0.06);
    text-align: right;
  }
  .summary-item {
    padding: 10px 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    font-size: 0.88rem;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item.correct-item { background: rgba(6,214,160,0.08); }
  .summary-item.wrong-item   { background: rgba(239,35,60,0.06); }

  .btn-restart {
    padding: 15px 42px;
    background: linear-gradient(135deg, var(--orange), #FF8C42);
    color: white; border: none; border-radius: 50px;
    font-size: 1.15rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 6px 18px rgba(255,107,53,0.35);
    transition: transform 0.15s;
    font-family: 'Heebo', sans-serif;
  }
  .btn-restart:hover { transform: translateY(-3px); }

  .fd { position: fixed; pointer-events: none; z-index: -1; font-size: 2rem; opacity: 0.05; }
  .fd1 { top: 10%; left: 5%;  animation: fd1 7s ease-in-out infinite; }
  .fd2 { top: 35%; right: 6%; animation: fd2 9s ease-in-out infinite; }
  .fd3 { bottom: 22%; left: 8%; animation: fd1 8s ease-in-out infinite 2s; }
  .fd4 { bottom: 12%; right: 5%; animation: fd2 6s ease-in-out infinite 1s; }
  @keyframes fd1 { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-18px) rotate(10deg); } }
  @keyframes fd2 { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(14px) rotate(-8deg); } }

  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="fd fd1">🛒</div>
<div class="fd fd2">🍎</div>
<div class="fd fd3">💰</div>
<div class="fd fd4">🥛</div>

<header>
  <h1>🛒 המכולת של דני</h1>
  <p>בואו נתרגל חשבון בחנות!</p>
</header>

<div class="scoreboard">
  <div class="score-pill question">
    <span>📋</span>
    <span>שאלה <span id="q-num">1</span> / 10</span>
  </div>
  <div class="score-pill correct">
    <span>✅</span>
    <span id="correct-count">0</span> נכון
  </div>
  <div class="score-pill wrong">
    <span>❌</span>
    <span id="wrong-count">0</span> טעות
  </div>
  <div class="score-pill lives">
    <span id="lives-display">❤️❤️❤️</span>
  </div>
</div>

<div class="progress-container">
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="game-area">

  <!-- QUESTION SCREEN -->
  <div id="screen-question" class="screen active">
    <div class="question-card" id="question-card">
      <div id="type-tag" class="type-tag"></div>
      <div class="store-scene">
        <div class="product-display" id="product-emoji"></div>
        <div class="sale-badge" id="sale-badge"></div>
        <div class="store-text" id="store-text"></div>
      </div>
      <div class="question-text" id="question-text"></div>
      <div class="answer-section">
        <div class="shekel-input-wrap">
          <span class="shekel-label">₪</span>
          <input type="number" class="answer-input" id="answer-input"
                 placeholder="?" min="0" max="9999" autocomplete="off" />
          <span class="unit-label" id="unit-label">שקל</span>
        </div>
        <button class="btn-check" id="check-btn" onclick="checkAnswer()">בדוק ✓</button>
      </div>
      <div class="feedback" id="feedback">
        <div class="feedback-icon" id="feedback-icon"></div>
        <div class="feedback-msg"  id="feedback-msg"></div>
        <div class="feedback-sub"  id="feedback-sub"></div>
        <div class="feedback-btns" id="feedback-btns"></div>
      </div>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="screen-gameover" class="screen">
    <div class="gameover-card">
      <div class="gameover-icon">💔</div>
      <div class="gameover-title">אוי! 3 טעויות!</div>
      <div class="gameover-sub">טעית 3 פעמים — המשחק מתחיל מחדש.<br>אל תתייאש, בפעם הבאה תצליח!</div>
      <button class="btn-restart" onclick="startGame()">🔄 שחקו שוב!</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="screen-results" class="screen">
    <div class="results-card">
      <div class="trophy-area" id="trophy-emoji">🏆</div>
      <div class="results-title">כל הכבוד!</div>
      <div class="results-score"><span id="final-score">0</span> / 10</div>
      <div class="results-sub">שאלות נכונות</div>
      <div class="stars" id="stars-display"></div>
      <div class="summary-list" id="summary-list"></div>
      <button class="btn-restart" onclick="startGame()">🔄 שחקו שוב!</button>
    </div>
  </div>

</div>

<script>
// ─── UTILS ───────────────────────────────────
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr)     { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── PRODUCTS ─────────────────────────────────
const PRODUCTS = [
  { name: 'בננה',    emoji: '🍌', plural: 'בננות' },
  { name: 'תפוח',    emoji: '🍎', plural: 'תפוחים' },
  { name: 'לחם',     emoji: '🍞', plural: 'כיכרות לחם' },
  { name: 'חלב',     emoji: '🥛', plural: 'שקיות חלב' },
  { name: 'קוטג\'',  emoji: '🧀', plural: 'גביעי קוטג\'' },
  { name: 'ביצה',    emoji: '🥚', plural: 'ביצים' },
  { name: 'שוקולד',  emoji: '🍫', plural: 'שוקולדים' },
  { name: 'עגבנייה', emoji: '🍅', plural: 'עגבניות' },
  { name: 'מלפפון',  emoji: '🥒', plural: 'מלפפונים' },
  { name: 'יוגורט',  emoji: '🥣', plural: 'יוגורטים' },
  { name: 'מיץ',     emoji: '🧃', plural: 'מיצים' },
  { name: 'חמאה',    emoji: '🧈', plural: 'חמאות' },
  { name: 'תות',     emoji: '🍓', plural: 'תותים' },
  { name: 'לימון',   emoji: '🍋', plural: 'לימונים' },
  { name: 'גזר',     emoji: '🥕', plural: 'גזרים' },
  { name: 'בצל',     emoji: '🧅', plural: 'בצלים' },
  { name: 'תירס',    emoji: '🌽', plural: 'תירסים' },
  { name: 'אבוקדו',  emoji: '🥑', plural: 'אבוקדו' },
  { name: 'פלפל',    emoji: '🫑', plural: 'פלפלים' },
  { name: 'חציל',    emoji: '🍆', plural: 'חצילים' },
];

const BILLS = [10, 20, 50, 100, 200];

// ─── GENERATORS ───────────────────────────────
function genPricePerUnit() {
  const p = pick(PRODUCTS), qty = rnd(2,5), ppu = rnd(2,15), tot = qty*ppu;
  return { type:'division', emoji:p.emoji, badge:'מבצע!',
    storeText:`${qty} ${p.plural} עולות ${tot} ש"ח`,
    question:`כמה עולה ${p.name} אחד/ת?`,
    answer:ppu, explain:`${tot} ÷ ${qty} = ${ppu} ש"ח`, unit:'שקל' };
}
function genTotalCost() {
  const p = pick(PRODUCTS), ppu = rnd(2,20), qty = rnd(2,8), tot = qty*ppu;
  return { type:'count', emoji:p.emoji, badge:'מה המחיר?',
    storeText:`${p.name} אחד/ת עולה ${ppu} ש"ח`,
    question:`כמה צריך לשלם על ${qty} ${p.plural}?`,
    answer:tot, explain:`${ppu} × ${qty} = ${tot} ש"ח`, unit:'שקל' };
}
function genChange() {
  const p = pick(PRODUCTS), ppu = rnd(3,22);
  const valid = BILLS.filter(b=>b>ppu); if(!valid.length) return genChange();
  const bill = pick(valid), change = bill-ppu;
  if(change<=0) return genChange();
  return { type:'change', emoji:p.emoji, badge:'עודף?',
    storeText:`${p.name} אחד/ת עולה ${ppu} ש"ח`,
    question:`שילמת שטר של ${bill} ש"ח. כמה עודף תקבל?`,
    answer:change, explain:`${bill} - ${ppu} = ${change} ש"ח עודף`, unit:'שקל' };
}
function genChangeMultiple() {
  const p = pick(PRODUCTS), ppu = rnd(2,12), qty = rnd(2,4), tot = ppu*qty;
  const valid = BILLS.filter(b=>b>tot); if(!valid.length) return genChangeMultiple();
  const bill = pick(valid), change = bill-tot;
  if(change<=0) return genChangeMultiple();
  return { type:'change', emoji:p.emoji, badge:'עודף?',
    storeText:`${p.name} אחד/ת עולה ${ppu} ש"ח`,
    question:`קנית ${qty} ${p.plural} ושילמת שטר של ${bill} ש"ח. כמה עודף?`,
    answer:change, explain:`${qty}×${ppu}=${tot}. עודף: ${bill}-${tot}=${change} ש"ח`, unit:'שקל' };
}
function genBundleDeal() {
  const p = pick(PRODUCTS), bQty = pick([2,3,4,5]), ppu = rnd(2,10), bPrice = ppu*bQty;
  const want = rnd(1,bQty-1), cost = want*ppu;
  return { type:'division', emoji:p.emoji, badge:'מבצע חבילה!',
    storeText:`${bQty} ${p.plural} ב-${bPrice} ש"ח`,
    question:`כמה עולים ${want} ${p.plural}?`,
    answer:cost, explain:`${bPrice}÷${bQty}=${ppu} ש"ח. ${want}×${ppu}=${cost} ש"ח`, unit:'שקל' };
}
function genHowManyCanBuy() {
  const p = pick(PRODUCTS), ppu = rnd(3,18);
  const budget = pick([10,15,20,25,30,40,50,60,100]);
  if(budget<=ppu) return genHowManyCanBuy();
  const can = Math.floor(budget/ppu);
  if(can<=0) return genHowManyCanBuy();
  return { type:'count', emoji:p.emoji, badge:'כמה אפשר לקנות?',
    storeText:`${p.name} אחד/ת עולה ${ppu} ש"ח`,
    question:`יש לי ${budget} ש"ח. כמה ${p.plural} אני יכול/ה לקנות?`,
    answer:can, explain:`${budget}÷${ppu}=${can} (שלמים)`, unit:p.plural };
}
function genDiscount() {
  const p = pick(PRODUCTS), orig = rnd(8,30), disc = rnd(1,Math.floor(orig/2)), sale = orig-disc;
  return { type:'price', emoji:p.emoji, badge:'הנחה!',
    storeText:`${p.name} עלה ${orig} ש"ח ויש הנחה של ${disc} ש"ח`,
    question:`כמה עולה ${p.name} עם ההנחה?`,
    answer:sale, explain:`${orig} - ${disc} = ${sale} ש"ח`, unit:'שקל' };
}
function genTwoProducts() {
  const p1 = pick(PRODUCTS); let p2 = pick(PRODUCTS), t=0;
  while(p2.name===p1.name && t++<10) p2=pick(PRODUCTS);
  const pr1=rnd(3,15), pr2=rnd(3,15), q1=rnd(1,4), q2=rnd(1,4), tot=pr1*q1+pr2*q2;
  return { type:'count', emoji:p1.emoji, badge:'קנייה כפולה!',
    storeText:`${p1.emoji} ${p1.name} – ${pr1} ש"ח | ${p2.emoji} ${p2.name} – ${pr2} ש"ח`,
    question:`קניתי ${q1} ${p1.plural} ו-${q2} ${p2.plural}. כמה לשלם סך הכל?`,
    answer:tot, explain:`(${q1}×${pr1}) + (${q2}×${pr2}) = ${q1*pr1}+${q2*pr2} = ${tot} ש"ח`, unit:'שקל' };
}
function genRemainder() {
  const p = pick(PRODUCTS), ppu = rnd(3,12);
  const budget = pick([20,25,30,40,50]);
  if(budget<=ppu) return genRemainder();
  const can = Math.floor(budget/ppu), paid = can*ppu, left = budget-paid;
  if(can<=0 || left<=0) return genRemainder();
  return { type:'change', emoji:p.emoji, badge:'שארית?',
    storeText:`${p.name} אחד/ת עולה ${ppu} ש"ח`,
    question:`יש לי ${budget} ש"ח. קניתי ${can} ${p.plural}. כמה כסף נשאר?`,
    answer:left, explain:`${can}×${ppu}=${paid}. נשאר: ${budget}-${paid}=${left} ש"ח`, unit:'שקל' };
}
function genPriceBundle() {
  const p = pick(PRODUCTS), qty = rnd(4,12), ppu = rnd(2,10), tot = qty*ppu;
  return { type:'count', emoji:p.emoji, badge:'חישוב מחיר',
    storeText:`${p.name} אחד/ת עולה ${ppu} ש"ח`,
    question:`כמה עולות ${qty} ${p.plural}?`,
    answer:tot, explain:`${ppu} × ${qty} = ${tot} ש"ח`, unit:'שקל' };
}

const GENERATORS = [
  genPricePerUnit, genTotalCost, genChange, genChangeMultiple,
  genBundleDeal, genHowManyCanBuy, genDiscount, genTwoProducts,
  genRemainder, genPriceBundle
];

function generateQuestion() {
  const q = pick(GENERATORS)();
  if(!q || !Number.isFinite(q.answer) || q.answer<=0) return generateQuestion();
  return q;
}

// ─── STATE ────────────────────────────────────
let questions=[], currentQ=0, correctCount=0, wrongTotal=0, lives=3, summaryData=[], solved=false;

// ─── SCREENS ──────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── START ────────────────────────────────────
function startGame() {
  questions     = Array.from({length:10}, generateQuestion);
  currentQ      = 0;
  correctCount  = 0;
  wrongTotal    = 0;
  lives         = 3;
  summaryData   = [];
  solved        = false;
  updateScoreboard();
  showScreen('screen-question');
  renderQuestion();
}

// ─── RENDER ───────────────────────────────────
function renderQuestion() {
  const q = questions[currentQ];
  solved = false;

  // Progress bar & number
  document.getElementById('q-num').textContent = currentQ+1;
  document.getElementById('progress-fill').style.width = ((currentQ/10)*100)+'%';

  // Type tag
  const tagEl=document.getElementById('type-tag');
  const tagMap={division:{l:'➗ חלוקה',c:'division'},count:{l:'✖️ כפל',c:'count'},change:{l:'💵 עודף',c:'change'},price:{l:'🏷️ מחיר',c:'price'}};
  const tag=tagMap[q.type]||tagMap.price;
  tagEl.textContent=tag.l; tagEl.className='type-tag '+tag.c;

  // Card — re-trigger animation
  const card=document.getElementById('question-card');
  card.className='question-card type-'+q.type;
  void card.offsetWidth;
  card.className='question-card type-'+q.type+' anim';

  // Content
  document.getElementById('product-emoji').textContent=q.emoji;
  document.getElementById('sale-badge').textContent=q.badge||'מבצע!';
  document.getElementById('store-text').innerHTML=q.storeText.replace(/\n/g,'<br>');
  document.getElementById('question-text').textContent=q.question;
  document.getElementById('unit-label').textContent=q.unit||'שקל';

  // --- INPUT: fully reset ---
  const input=document.getElementById('answer-input');
  input.value='';
  input.disabled=false;
  input.className='answer-input';
  input.style.borderColor='';
  input.style.boxShadow='';

  // Check button: fully enabled
  const btn=document.getElementById('check-btn');
  btn.disabled=false;

  // Feedback: fully hidden
  const fb=document.getElementById('feedback');
  fb.className='feedback';    // removes 'show', 'correct-fb', 'wrong-fb'
  fb.style.display='none';

  // Focus after DOM settles
  requestAnimationFrame(()=>{ input.focus(); });
}

// ─── CHECK ────────────────────────────────────
function checkAnswer() {
  if(solved) return;

  const input=document.getElementById('answer-input');
  const raw=input.value.trim();
  const val=parseFloat(raw);

  if(raw===''||isNaN(val)) {
    input.classList.remove('shake');
    void input.offsetWidth;
    input.classList.add('shake');
    setTimeout(()=>input.classList.remove('shake'),450);
    return;
  }

  const q=questions[currentQ];
  const isCorrect=Math.abs(val-q.answer)<0.01;

  if(isCorrect) {
    solved=true;
    correctCount++;
    summaryData.push({text:q.question,correct:true});
    updateScoreboard();

    // Lock input & button
    input.disabled=true;
    document.getElementById('check-btn').disabled=true;

    showFeedbackCorrect(q);
    launchConfetti(35);
  } else {
    wrongTotal++;
    lives--;
    updateScoreboard();

    // Shake
    input.classList.remove('shake');
    void input.offsetWidth;
    input.classList.add('shake');
    setTimeout(()=>input.classList.remove('shake'),450);

    if(lives<=0) {
      // Lock everything, go to game over
      input.disabled=true;
      document.getElementById('check-btn').disabled=true;
      setTimeout(()=>showScreen('screen-gameover'),800);
    } else {
      // Show "try again" feedback — leave input enabled
      showFeedbackWrong();
    }
  }
}

// ─── FEEDBACK ─────────────────────────────────
function showFeedbackCorrect(q) {
  const fb=document.getElementById('feedback');
  fb.style.display='';
  fb.className='feedback correct-fb show';
  document.getElementById('feedback-icon').textContent=pick(['🎉','⭐','🌟','👏','🥳','💪']);
  document.getElementById('feedback-msg').textContent=pick(['כל הכבוד!','מעולה!','נכון מאוד!','פנטסטי!','אלוף/ה!']);
  document.getElementById('feedback-sub').textContent=q.explain;
  const btns=document.getElementById('feedback-btns');
  btns.innerHTML='';
  const b=document.createElement('button');
  b.className='btn-next';
  b.textContent=currentQ<9?'השאלה הבאה ←':'🏁 לתוצאות';
  b.onclick=nextQuestion;
  btns.appendChild(b);
}

function showFeedbackWrong() {
  const fb=document.getElementById('feedback');
  fb.style.display='';
  fb.className='feedback wrong-fb show';
  const livesStr='❤️'.repeat(lives);
  document.getElementById('feedback-icon').textContent=pick(['😅','🤔','💭','✏️']);
  document.getElementById('feedback-msg').textContent=pick(['כמעט!','נסי/ו שוב!','לא מדויק...','עוד פעם!']);
  document.getElementById('feedback-sub').textContent=`לא נכון. נשארו לך ${livesStr} חיים.`;
  const btns=document.getElementById('feedback-btns');
  btns.innerHTML='';

  const bRetry=document.createElement('button');
  bRetry.className='btn-retry'; bRetry.textContent='✏️ נסה שוב'; bRetry.onclick=retryAnswer;
  btns.appendChild(bRetry);

  const bSkip=document.createElement('button');
  bSkip.className='btn-next'; bSkip.textContent='דלג לשאלה הבאה ←'; bSkip.onclick=skipQuestion;
  btns.appendChild(bSkip);
}

// ─── RETRY / SKIP / NEXT ──────────────────────
function retryAnswer() {
  // Hide feedback and let them try again — input stays enabled
  const fb=document.getElementById('feedback');
  fb.className='feedback';
  fb.style.display='none';

  const input=document.getElementById('answer-input');
  input.value='';
  input.disabled=false;
  input.className='answer-input';
  document.getElementById('check-btn').disabled=false;
  requestAnimationFrame(()=>input.focus());
}

function skipQuestion() {
  if(!solved) summaryData.push({text:questions[currentQ].question,correct:false});
  nextQuestion();
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=10) showResults();
  else renderQuestion();
}

// ─── SCOREBOARD ───────────────────────────────
function updateScoreboard() {
  document.getElementById('correct-count').textContent=correctCount;
  document.getElementById('wrong-count').textContent=wrongTotal;
  const h=['','❤️','❤️❤️','❤️❤️❤️'];
  document.getElementById('lives-display').textContent=h[Math.max(0,Math.min(3,lives))];
}

// ─── RESULTS ──────────────────────────────────
function showResults() {
  showScreen('screen-results');
  document.getElementById('final-score').textContent=correctCount;
  let stars='⭐',trophy='💪';
  if(correctCount===10){stars='⭐⭐⭐⭐⭐';trophy='🥇';}
  else if(correctCount>=8){stars='⭐⭐⭐⭐';trophy='🏆';}
  else if(correctCount>=6){stars='⭐⭐⭐';trophy='🎖️';}
  else if(correctCount>=4){stars='⭐⭐';trophy='👍';}
  document.getElementById('trophy-emoji').textContent=trophy;
  document.getElementById('stars-display').textContent=stars;
  const list=document.getElementById('summary-list');
  list.innerHTML=summaryData.map((item,i)=>
    `<div class="summary-item ${item.correct?'correct-item':'wrong-item'}">
      <span>${i+1}. ${item.text.length>55?item.text.substring(0,55)+'…':item.text}</span>
      <span>${item.correct?'✅':'❌'}</span>
    </div>`).join('');
  if(correctCount>=9) launchConfetti(80);
  else if(correctCount>=7) launchConfetti(40);
}

// ─── CONFETTI ─────────────────────────────────
function launchConfetti(count=30) {
  const colors=['#FF6B35','#FFD23F','#06D6A0','#3A86FF','#7B2FBE','#EF233C'];
  for(let i=0;i<count;i++) setTimeout(()=>{
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${rnd(5,95)}vw;top:-20px;background:${pick(colors)};width:${rnd(8,16)}px;height:${rnd(8,16)}px;border-radius:${rnd(0,8)}px;animation-duration:${rnd(18,38)/10}s;animation-delay:${rnd(0,8)/10}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  },i*28);
}

// ─── KEYBOARD ─────────────────────────────────
document.getElementById('answer-input').addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  if(solved) nextQuestion();
  else checkAnswer();
});

// ─── INIT ─────────────────────────────────────
startGame();
</script>
