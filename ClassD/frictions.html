<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אלוף השברים</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Rubik', 'Segoe UI', Arial, sans-serif;
      direction: rtl;
      background: linear-gradient(135deg, #e8f4fd 0%, #f0f9eb 100%);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }
    #app { max-width: 560px; margin: 0 auto; }
    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .title { font-size: 24px; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 0.5rem; }
    .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 1.5rem; line-height: 1.6; }

    .lives-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 1rem; }
    .heart { font-size: 24px; transition: transform 0.3s, filter 0.3s; }
    .heart.lost { filter: grayscale(1) opacity(0.25); transform: scale(0.8); }

    .xp-bar-wrap { background: #f3f4f6; border-radius: 99px; height: 10px; margin-bottom: 0.4rem; overflow: hidden; }
    .xp-bar-fill { height: 100%; background: #3B6D11; border-radius: 99px; transition: width 0.5s ease; }
    .xp-label { font-size: 12px; color: #6b7280; text-align: center; margin-bottom: 1rem; }

    .q-label { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 1.2rem; }

    .fraction-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 1.8rem;
      flex-direction: row;
      direction: ltr;
    }
    .frac {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.1;
    }
    .frac .num { border-bottom: 2.5px solid #1a1a2e; padding: 0 8px 3px; }
    .frac .den { padding: 3px 8px 0; }
    .op { font-size: 28px; font-weight: 700; color: #6b7280; }

    .answer-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 1.2rem;
    }
    .answer-area input {
      width: 80px;
      text-align: center;
      font-size: 22px;
      font-family: 'Rubik', sans-serif;
      border-radius: 10px;
      border: 1.5px solid #d1d5db;
      padding: 8px;
      background: #f9fafb;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
    }
    .answer-area input:focus { border-color: #185FA5; background: #fff; }
    .ans-line { width: 80px; border-bottom: 2.5px solid #1a1a2e; }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 17px;
      font-weight: 500;
      font-family: 'Rubik', sans-serif;
      cursor: pointer;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #1a1a2e;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 0.6rem;
    }
    .btn:hover { background: #f3f4f6; }
    .btn:active { transform: scale(0.98); }
    .btn.primary {
      background: #185FA5;
      color: #ffffff;
      border-color: #185FA5;
    }
    .btn.primary:hover { background: #0C447C; }

    .feedback {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      min-height: 26px;
      margin-bottom: 0.6rem;
    }
    .feedback.ok { color: #3B6D11; }
    .feedback.err { color: #A32D2D; }

    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 1rem 0; }
    .badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 99px;
      font-weight: 500;
    }
    .badge.earned { background: #EAF3DE; color: #3B6D11; border: 1px solid #97C459; }
    .badge.locked { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

    .streak-chip {
      display: inline-block;
      background: #FAEEDA;
      color: #854F0B;
      border: 1px solid #EF9F27;
      border-radius: 99px;
      padding: 3px 14px;
      font-size: 13px;
      font-weight: 500;
    }

    .score-big { font-size: 48px; font-weight: 700; text-align: center; color: #185FA5; margin: 0.5rem 0; }
    .score-sub { text-align: center; font-size: 15px; color: #6b7280; margin-bottom: 1.2rem; }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1e40af;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 1rem;
    }

    .result-grid { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 1rem; }
    .result-grid th {
      background: #f3f4f6;
      color: #6b7280;
      padding: 10px 8px;
      font-weight: 500;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
    }
    .result-grid td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid #f3f4f6;
      color: #1a1a2e;
      vertical-align: middle;
    }
    .result-grid tr:last-child td { border-bottom: none; }
    .td-ok { color: #3B6D11; font-weight: 700; }
    .td-err { color: #A32D2D; font-weight: 700; }

    .frac-sm {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.1;
      vertical-align: middle;
    }
    .frac-sm .num { border-bottom: 1.5px solid #1a1a2e; padding: 0 4px 1px; }
    .frac-sm .den { padding: 1px 4px 0; }
    .op-sm { font-size: 15px; font-weight: 700; color: #6b7280; vertical-align: middle; margin: 0 3px; }

    .shake { animation: sh 0.35s; }
    @keyframes sh { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .pop { animation: pop 0.4s; }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.04)} 100%{transform:scale(1)} }

    .note { font-size: 13px; color: #6b7280; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div id="app">

  <!-- מסך פתיחה -->
  <div id="screen-start" class="screen active">
    <div class="card" style="text-align:center; padding:2.5rem 1.5rem;">
      <div class="avatar">🧮</div>
      <div class="title">אלוף השברים</div>
      <div class="subtitle">5 שאלות על מציאת מכנה משותף<br>3 לבבות — אל תאבד אותם!</div>
      <div class="badge-row" id="badge-preview"></div>
      <button class="btn primary" onclick="startGame()">בואו נתחיל! 🚀</button>
    </div>
  </div>

  <!-- מסך משחק -->
  <div id="screen-game" class="screen">
    <div class="lives-row" id="lives-row"></div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xp-bar" style="width:0%"></div></div>
    <div class="xp-label" id="xp-label">XP: 0</div>

    <div class="card" id="question-card">
      <div class="q-label" id="q-label"></div>
      <div class="fraction-row" id="q-display"></div>
      <div class="answer-area">
        <input type="number" id="inp-num" placeholder="מונה" min="0">
        <div class="ans-line"></div>
        <input type="number" id="inp-den" placeholder="מכנה" min="1">
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn primary" onclick="checkAnswer()">בדיקה ✓</button>
      <div style="margin-top:0.5rem;text-align:center;" id="streak-area"></div>
    </div>
  </div>

  <!-- מסך גיים אובר -->
  <div id="screen-gameover" class="screen">
    <div class="card" style="text-align:center;">
      <div class="avatar" style="background:#fee2e2;color:#991b1b;">💔</div>
      <div class="title">אוי... נגמרו הלבבות</div>
      <div class="subtitle" id="go-msg"></div>
      <button class="btn primary" onclick="startGame()">נסה שוב! 💪</button>
    </div>
  </div>

  <!-- מסך סיום -->
  <div id="screen-end" class="screen">
    <div class="card" style="text-align:center;">
      <div class="avatar" style="background:#dcfce7;color:#166534;">🏆</div>
      <div class="title">כל הכבוד!</div>
      <div class="subtitle" id="end-msg"></div>
      <div class="score-big" id="end-score"></div>
      <div class="score-sub" id="end-sub"></div>
      <div class="badge-row" id="end-badges"></div>
      <table class="result-grid">
        <thead><tr><th>#</th><th>תרגיל</th><th>תשובה</th><th>ניסיונות</th><th>שניות</th></tr></thead>
        <tbody id="result-body"></tbody>
      </table>
      <div class="note">אנא קרא לאמא או אבא לחיבוק גדול! 🤗</div>
      <button class="btn primary" style="margin-top:1rem" onclick="startGame()">שחק שוב 🔄</button>
    </div>
  </div>

</div>

<script>
  let questions=[], cur=0, lives=3, xp=0, streak=0, startTime, attempts;
  let log=[];

  const BADGES=[
    {id:'speed',    label:'⚡ מהיר כברק',  desc:'שאלה תוך 10 שניות'},
    {id:'perfect',  label:'🌟 ללא טעויות', desc:'כל 5 שאלות בניסיון ראשון'},
    {id:'streak3',  label:'🔥 3 ברצף',     desc:'3 נכונות ברצף'},
    {id:'comeback', label:'💪 חזרתי חזק',  desc:'טעית ועדיין סיימת'},
  ];
  let earnedBadges=new Set();

  function gcd(a,b){return b===0?a:gcd(b,a%b);}
  function simplify(n,d){let g=gcd(Math.abs(n),Math.abs(d));return{n:n/g,d:d/g};}
  function lcm(a,b){return(a*b)/gcd(a,b);}

  function genQuestion(){
    let op=['+','-'][Math.floor(Math.random()*2)];
    let d1,d2;
    do {
      d1=Math.floor(Math.random()*8)+2;
      d2=Math.floor(Math.random()*8)+2;
    } while(d1===d2);
    let n1=Math.floor(Math.random()*(d1-1))+1;
    let n2=Math.floor(Math.random()*(d2-1))+1;
    if(op==='-'){
      let common=lcm(d1,d2);
      let a=n1*(common/d1), b=n2*(common/d2);
      if(a<=b) op='+';
    }
    let common=lcm(d1,d2);
    let a=n1*(common/d1), b=n2*(common/d2);
    let resN=op==='+'?a+b:a-b;
    if(resN<0) resN=0;
    let {n,d}=simplify(resN,common);
    return {n1,d1,op,n2,d2,common,ans:{n,d},display:`${n1}/${d1} ${op} ${n2}/${d2}`};
  }

  function renderLives(){
    let r=document.getElementById('lives-row');
    r.innerHTML='';
    for(let i=0;i<3;i++){
      let h=document.createElement('span');
      h.className='heart'+(i>=lives?' lost':'');
      h.textContent='❤️';
      r.appendChild(h);
    }
  }

  function renderQuestion(){
    let q=questions[cur];
    document.getElementById('q-label').textContent=`שאלה ${cur+1} מתוך ${questions.length}`;
    document.getElementById('q-display').innerHTML=
      `<div class="frac"><span class="num">${q.n1}</span><span class="den">${q.d1}</span></div>
       <span class="op">${q.op}</span>
       <div class="frac"><span class="num">${q.n2}</span><span class="den">${q.d2}</span></div>
       <span class="op">=</span>
       <div class="frac ans-frac"><span class="num">?</span><span class="den">?</span></div>`;
    document.getElementById('inp-num').value='';
    document.getElementById('inp-den').value='';
    document.getElementById('feedback').textContent='';
    document.getElementById('feedback').className='feedback';
    document.getElementById('streak-area').innerHTML=streak>=2?`<span class="streak-chip">🔥 רצף ${streak}!</span>`:'';
    startTime=Date.now();
    attempts=0;
    renderLives();
    let xpPct=Math.min((xp/200)*100,100);
    document.getElementById('xp-bar').style.width=xpPct+'%';
    document.getElementById('xp-label').textContent=`XP: ${xp}`;
    document.getElementById('inp-num').focus();
  }

  function checkAnswer(){
    let q=questions[cur];
    let uN=parseInt(document.getElementById('inp-num').value);
    let uD=parseInt(document.getElementById('inp-den').value);
    if(isNaN(uN)||isNaN(uD)||uD===0){
      setFeedback('error','אנא מלא מונה ומכנה תקינים');
      return;
    }
    let {n,d}=simplify(uN,uD);
    attempts++;
    if(n===q.ans.n && d===q.ans.d){
      let secs=Math.round((Date.now()-startTime)/1000);
      let gained=attempts===1?20:10;
      if(secs<=10) gained+=5;
      xp+=gained;
      streak++;
      log.push({q:q.display,ans:`${q.ans.n}/${q.ans.d}`,att:attempts,secs,ok:true});
      if(secs<=10) earnedBadges.add('speed');
      if(streak>=3) earnedBadges.add('streak3');
      setFeedback('ok',getOkMsg(streak)+` (+${gained} XP)`);
      let card=document.getElementById('question-card');
      card.classList.add('pop');
      setTimeout(()=>card.classList.remove('pop'),400);
      setTimeout(()=>{
        cur++;
        if(cur>=questions.length) endGame();
        else renderQuestion();
      },900);
    } else {
      streak=0;
      lives--;
      log.push({q:q.display,ans:`${q.ans.n}/${q.ans.d}`,att:attempts,secs:'-',ok:false});
      let card=document.getElementById('question-card');
      card.classList.add('shake');
      setTimeout(()=>card.classList.remove('shake'),400);
      renderLives();
      if(lives<=0){ setTimeout(()=>gameOver(),600); return; }
      let msgs=['בדוק את המכנה המשותף!','נסה לפשט את התשובה','כמעט! נסה שוב 💪'];
      setFeedback('error',msgs[Math.min(attempts-1,2)]);
    }
  }

  function getOkMsg(s){
    if(s>=5) return '🌟 וואו! אלוף אמיתי!';
    if(s>=3) return '🔥 מדהים, רצף חזק!';
    if(s===2) return '⭐ פנטסטי!';
    return '✓ נכון! כל הכבוד!';
  }

  function setFeedback(type,msg){
    let el=document.getElementById('feedback');
    el.textContent=msg;
    el.className='feedback '+(type==='ok'?'ok':'err');
  }

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>{
      s.classList.toggle('active',s.id===id);
    });
  }

  function startGame(){
    questions=[];
    for(let i=0;i<5;i++) questions.push(genQuestion());
    cur=0; lives=3; xp=0; streak=0; log=[];
    earnedBadges=new Set();
    showScreen('screen-game');
    renderQuestion();
  }

  function gameOver(){
    let correct=log.filter(l=>l.ok).length;
    document.getElementById('go-msg').textContent=
      `ענית נכון על ${correct} שאלות. אתה יכול לעשות טוב יותר — קדימה!`;
    showScreen('screen-gameover');
  }

  function endGame(){
    let perfect=log.every(l=>l.att===1&&l.ok);
    let hadMistake=log.some(l=>!l.ok);
    if(perfect) earnedBadges.add('perfect');
    if(hadMistake) earnedBadges.add('comeback');

    let xpPct=Math.min((xp/200)*100,100);
    document.getElementById('xp-bar').style.width=xpPct+'%';

    let correct=log.filter(l=>l.ok).length;
    let msgs=['יפה מאוד, ממשיכים להשתפר!','מצויין! אתה שולט בשברים!','מושלם! אתה אלוף! 🏆'];
    document.getElementById('end-msg').textContent=correct>=5?msgs[2]:correct>=3?msgs[1]:msgs[0];
    document.getElementById('end-score').textContent=`${xp} XP`;
    document.getElementById('end-sub').textContent=`${correct}/5 נכונות`;

    let eb=document.getElementById('end-badges');
    eb.innerHTML='';
    BADGES.forEach(b=>{
      let el=document.createElement('div');
      let earned=earnedBadges.has(b.id);
      el.className='badge '+(earned?'earned':'locked');
      el.textContent=b.label;
      el.title=b.desc;
      eb.appendChild(el);
    });

    let tbody=document.getElementById('result-body');
    tbody.innerHTML='';
    log.forEach((l,i)=>{
      let m=l.q.match(/(\d+)\/(\d+)\s*([+\-])\s*(\d+)\/(\d+)/);
      let qHTML=m?
        `<span class="frac-sm"><span class="num">${m[1]}</span><span class="den">${m[2]}</span></span>
         <span class="op-sm">${m[3]}</span>
         <span class="frac-sm"><span class="num">${m[4]}</span><span class="den">${m[5]}</span></span>`
        :l.q;
      let p=l.ans.split('/');
      let aHTML=p.length===2?
        `<span class="frac-sm"><span class="num">${p[0]}</span><span class="den">${p[1]}</span></span>`
        :l.ans;
      tbody.innerHTML+=`<tr>
        <td>${i+1}</td>
        <td>${qHTML}</td>
        <td>${aHTML}</td>
        <td class="${l.ok?'td-ok':'td-err'}">${l.att}</td>
        <td>${l.secs}</td>
      </tr>`;
    });

    showScreen('screen-end');
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&document.getElementById('screen-game').classList.contains('active')) checkAnswer();
  });

  let bp=document.getElementById('badge-preview');
  BADGES.forEach(b=>{
    let el=document.createElement('div');
    el.className='badge locked';
    el.textContent=b.label;
    bp.appendChild(el);
  });
</script>
</body>
</html>
